<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML 需求评审助手</title>
  <link rel="stylesheet" href="/assets/index.css" />

</head>
<body>
  <header>
    <div class="brand-title">
      <h1 id="appTitle">HTML 需求评审助手</h1>
      <button class="icon-button brand-edit-button" id="editAppTitleBtn" type="button" aria-label="编辑标题" title="编辑标题">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M12 20h9"></path>
          <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
        </svg>
      </button>
    </div>
    <div class="header-actions">
      <span class="pill"><span class="dot"></span>本地服务运行中</span>
      <button class="icon-button" id="settingsButton" type="button" aria-label="AI 与权限设置" title="AI 与权限设置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path>
          <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.03-1.56 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.56V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.56 1.03H21a2 2 0 1 1 0 4h-.09A1.7 1.7 0 0 0 19.4 15Z"></path>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-copy">
        <h2 class="title" id="heroTitle">把 HTML demo 变成内网多人评审页面</h2>
        <p class="desc" id="heroDesc">选择你的需求 demo，系统会生成一个评审链接。同事在同一个内网里打开链接后，可以输入姓名、选中页面元素、添加批注、回复和标记已解决。</p>
        <div class="hero-actions">
          <button class="subtle-button" id="editHeroBtn" type="button">编辑文案</button>
        </div>
        <form class="hero-editor" id="heroEditor">
          <div>
            <label for="heroTitleInput">标题</label>
            <input id="heroTitleInput" type="text" />
          </div>
          <div>
            <label for="heroDescInput">描述</label>
            <textarea id="heroDescInput"></textarea>
          </div>
          <div class="editor-actions">
            <button class="secondary" id="cancelHeroEdit" type="button">取消</button>
            <button type="submit">保存文案</button>
          </div>
        </form>
      </div>
    </section>

    <section class="panel">
      <h2>导入 HTML</h2>
      <div class="import-grid">
        <form id="uploadForm" class="form-grid import-card">
          <div>
            <label for="file">上传 HTML 文件</label>
            <input id="file" name="file" type="file" accept=".html,text/html" />
            <div id="fileNamePreview" class="file-name-preview">导入html格式的文件，可以是文档、demo或者设计图。</div>
          </div>
          <button type="submit">导入</button>
        </form>
        <form id="urlForm" class="form-grid import-card">
          <div>
            <label for="pageUrl">导入可访问链接</label>
            <input id="pageUrl" name="url" type="url" placeholder="https://example.com/page.html" />
            <div class="file-name-preview">保存链接的快照到本地，让我们面向竞品描述需求</div>
          </div>
          <button type="submit">保存快照</button>
        </form>
      </div>
    </section>

    <section class="panel">
      <div class="section-heading">
        <h2>评审文档</h2>
        <div class="doc-toolbar">
          <label class="doc-search" for="docSearchInput">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="m20 20-3.5-3.5"></path>
            </svg>
            <input id="docSearchInput" type="search" placeholder="搜索文档名称" autocomplete="off" />
          </label>
          <button class="secondary compact-button" id="createFolderBtn" type="button">新建文件夹</button>
        </div>
      </div>
      <div id="docs" class="docs"></div>
    </section>
  </main>

  <div class="settings-backdrop" id="settingsBackdrop" aria-hidden="true">
    <section class="settings-dialog" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="settings-dialog-header">
        <h2 id="settingsTitle">AI 与权限设置</h2>
        <button class="icon-button" id="closeSettingsButton" type="button" aria-label="关闭设置" title="关闭设置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </div>
      <form id="settingsForm" class="settings-grid">
        <div>
          <label for="aiBaseUrl">AI Base URL</label>
          <input id="aiBaseUrl" type="url" placeholder="https://api.openai.com/v1" />
        </div>
        <div>
          <label for="aiModel">模型名</label>
          <input id="aiModel" type="text" placeholder="gpt-4o-mini" />
        </div>
        <div class="wide">
          <label for="aiApiKey">API Key</label>
          <input id="aiApiKey" type="password" placeholder="留空则保留已保存的 Key" />
          <div id="aiKeyStatus" class="file-name-preview">尚未配置 API Key。</div>
        </div>
        <div class="editor-actions wide">
          <button type="submit">保存设置</button>
        </div>
      </form>
    </section>
  </div>

  <div class="settings-backdrop" id="collaboratorsBackdrop" aria-hidden="true">
    <section class="settings-dialog" role="dialog" aria-modal="true" aria-labelledby="collaboratorsTitle">
      <div class="settings-dialog-header">
        <h2 id="collaboratorsTitle">协作者</h2>
        <button class="icon-button" id="closeCollaboratorsButton" type="button" aria-label="关闭协作者设置" title="关闭协作者设置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </div>
      <form id="collaboratorsForm" class="settings-grid">
        <div class="wide">
          <label for="collaboratorsInput">需求文档协作者</label>
          <input id="collaboratorsInput" type="text" placeholder="张三、李四、产品经理" />
          <div class="file-name-preview">多人用顿号、逗号或换行分隔。留空时，任何填写姓名的人都可以协作编写该文档。</div>
        </div>
        <div class="editor-actions wide">
          <button type="submit">保存协作者</button>
        </div>
      </form>
    </section>
  </div>

  <div class="settings-backdrop" id="appTitleBackdrop" aria-hidden="true">
    <section class="settings-dialog" role="dialog" aria-modal="true" aria-labelledby="appTitleDialogTitle">
      <div class="settings-dialog-header">
        <h2 id="appTitleDialogTitle">编辑标题</h2>
        <button class="icon-button" id="closeAppTitleButton" type="button" aria-label="关闭标题编辑" title="关闭标题编辑">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </div>
      <form id="appTitleForm" class="settings-grid">
        <div class="wide">
          <label for="appTitleInput">页面标题</label>
          <input id="appTitleInput" type="text" />
        </div>
        <div class="editor-actions wide">
          <button type="submit">保存标题</button>
        </div>
      </form>
    </section>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/assets/index.js" defer></script>
</body>
</html>
