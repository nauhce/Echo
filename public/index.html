<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML 需求评审助手</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8;
      --panel: #ffffff;
      --text: #17191f;
      --muted: #667085;
      --line: #e4e7ec;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --success: #12b76a;
      --shadow: 0 18px 50px rgba(16, 24, 40, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    h1 { margin: 0; font-size: 18px; letter-spacing: 0; }
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px;
      display: grid;
      gap: 20px;
    }
    .hero {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 24px;
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.6fr);
      gap: 22px;
      align-items: start;
    }
    .title {
      font-size: 28px;
      line-height: 1.2;
      margin: 0 0 10px;
    }
    .desc {
      color: var(--muted);
      margin: 0;
      line-height: 1.7;
      max-width: 720px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    .server {
      display: grid;
      gap: 10px;
      font-size: 14px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #027a48;
      background: #ecfdf3;
      border: 1px solid #abefc6;
      border-radius: 999px;
      padding: 6px 10px;
      width: fit-content;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input[type="text"], input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      font: inherit;
      background: #fff;
    }
    .form-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: end;
    }
    button, .button {
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font: inherit;
      font-weight: 650;
      padding: 11px 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      white-space: nowrap;
    }
    button:hover, .button:hover { background: var(--accent-dark); }
    .secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }
    .secondary:hover { background: #f9fafb; }
    .docs {
      display: grid;
      gap: 12px;
    }
    .doc {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
    }
    .doc h3 {
      margin: 0 0 6px;
      font-size: 16px;
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin: 10px 0 0;
    }
    .file-name-preview {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }
    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: #111827;
      color: #fff;
      padding: 12px 14px;
      border-radius: 8px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(8px);
      transition: 0.18s ease;
      pointer-events: none;
      z-index: 50;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    @media (max-width: 820px) {
      header { padding: 0 18px; }
      main { padding: 18px; }
      .hero, .form-grid, .doc { grid-template-columns: 1fr; }
      .actions { justify-content: stretch; }
      .actions > * { flex: 1; }
    }
  </style>
</head>
<body>
  <header>
    <h1>HTML 需求评审助手</h1>
    <span class="pill"><span class="dot"></span>本地服务运行中</span>
  </header>

  <main>
    <section class="hero">
      <div>
        <h2 class="title">把 HTML demo 变成内网多人评审页面</h2>
        <p class="desc">选择你的需求 demo，系统会生成一个评审链接。同事在同一个内网里打开链接后，可以输入姓名、选中页面元素、添加批注、回复和标记已解决。</p>
      </div>
      <div class="panel server">
        <strong>可分享地址</strong>
        <div id="serverLinks"></div>
      </div>
    </section>

    <section class="panel">
      <h2>导入 HTML</h2>
      <form id="uploadForm" class="form-grid">
        <div>
          <label for="file">上传 HTML 文件</label>
          <input id="file" name="file" type="file" accept=".html,text/html" />
          <div id="fileNamePreview" class="file-name-preview">文档名称会自动使用文件名。</div>
        </div>
        <button type="submit">上传导入</button>
      </form>
    </section>

    <section class="panel">
      <h2>评审文档</h2>
      <div id="docs" class="docs"></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const docsEl = document.getElementById("docs");
    const toastEl = document.getElementById("toast");
    let config = null;

    function toast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      setTimeout(() => toastEl.classList.remove("show"), 1800);
    }

    async function api(path, options) {
      const res = await fetch(path, options);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "请求失败");
      return data;
    }

    function reviewUrl(doc) {
      return `${location.origin}/review/${doc.id}`;
    }

    function lanUrl(doc) {
      const ip = config && config.localIps && config.localIps[0];
      return ip ? `http://${ip}:${config.port}/review/${doc.id}` : reviewUrl(doc);
    }

    async function copy(text) {
      await navigator.clipboard.writeText(text);
      toast("链接已复制");
    }

    async function loadConfig() {
      config = await api("/api/config");
      const links = document.getElementById("serverLinks");
      const items = [`本机：${location.origin}`].concat((config.localIps || []).map(ip => `内网：http://${ip}:${config.port}`));
      links.innerHTML = items.map(item => `<div class="meta">${item}</div>`).join("");
    }

    async function loadDocs() {
      const { docs } = await api("/api/docs");
      if (!docs.length) {
        docsEl.innerHTML = `<div class="meta">还没有导入文档。</div>`;
        return;
      }
      docsEl.innerHTML = docs.map(doc => `
        <article class="doc">
          <div>
            <h3>${escapeHtml(doc.title)}</h3>
            <div class="meta">ID：${escapeHtml(doc.id)} · 文件：${escapeHtml(doc.filename || "")}</div>
            <div class="meta">评审链接：${escapeHtml(lanUrl(doc))}</div>
          </div>
          <div class="actions">
            <a class="button" href="/review/${encodeURIComponent(doc.id)}" target="_blank">打开评审</a>
            <button class="secondary" type="button" data-copy="${escapeHtml(lanUrl(doc))}">复制内网链接</button>
            <a class="button secondary" href="/api/docs/${encodeURIComponent(doc.id)}/export">导出批注</a>
          </div>
        </article>
      `).join("");
      docsEl.querySelectorAll("[data-copy]").forEach(btn => {
        btn.addEventListener("click", () => copy(btn.dataset.copy));
      });
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
    }

    document.getElementById("file").addEventListener("change", (event) => {
      const file = event.currentTarget.files && event.currentTarget.files[0];
      document.getElementById("fileNamePreview").textContent = file
        ? `文档名称：${file.name.replace(/\.html?$/i, "")}`
        : "文档名称会自动使用文件名。";
    });

    document.getElementById("uploadForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const form = event.currentTarget;
      try {
        const file = document.getElementById("file").files[0];
        if (!file) throw new Error("请选择 HTML 文件");
        const data = new FormData(form);
        data.set("title", file.name.replace(/\.html?$/i, ""));
        await fetch("/api/docs/upload", { method: "POST", body: data }).then(async res => {
          const body = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(body.error || "上传失败");
          return body;
        });
        toast("已上传 HTML");
        form.reset();
        document.getElementById("fileNamePreview").textContent = "文档名称会自动使用文件名。";
        loadDocs();
      } catch (error) {
        toast(error.message);
      }
    });

    loadConfig().then(loadDocs);
  </script>
</body>
</html>
